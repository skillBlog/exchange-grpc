syntax = "proto3";

package user.v1;

option go_package = "github.com/exchange-grpc/proto/pb/user/v1;userv1";

import "buf/validate/validate.proto";

// UserService — аутентификация и управление пользователями.
service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

message RegisterRequest {
  string email = 1 [(buf.validate.field).string = {email: true, max_len: 254}];
  string password = 2 [(buf.validate.field).string = {min_len: 8, max_len: 128}];
}

message RegisterResponse {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
}

message LoginRequest {
  string email = 1 [(buf.validate.field).string = {email: true, max_len: 254}];
  string password = 2 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
}

message LoginResponse {
  string access_token = 1 [(buf.validate.field).string.min_len = 1];
  string refresh_token = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}

message RefreshTokenResponse {
  string access_token = 1 [(buf.validate.field).string.min_len = 1];
}

// GetUserRequest — user_id извлекается из JWT/metadata.
message GetUserRequest {}

message GetUserResponse {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  string email = 2 [(buf.validate.field).string.email = true];
  repeated string roles = 3;
}

message LogoutRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}

message LogoutResponse {}
