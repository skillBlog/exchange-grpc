syntax = "proto3";

package common.v1;

option go_package = "github.com/exchange-grpc/proto/pb/common/v1;commonv1";

import "buf/validate/validate.proto";

// Market — спотовый торговый рынок.
// Активность определяется полем enabled (active / inactive).
message Market {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [(buf.validate.field).string.min_len = 1];
  string base_asset = 3;
  string quote_asset = 4;
  bool enabled = 5;
  repeated string allowed_roles = 6;
}
