syntax = "proto3";

package common.v1;

option go_package = "github.com/exchange-grpc/proto/pb/common/v1;commonv1";

import "google/protobuf/timestamp.proto";

// Market — спотовый торговый рынок.
message Market {
  string id = 1;
  string name = 2;
  string base_asset = 3;
  string quote_asset = 4;
  bool enabled = 5;
  google.protobuf.Timestamp deleted_at = 6;
  repeated string allowed_roles = 7;
}
