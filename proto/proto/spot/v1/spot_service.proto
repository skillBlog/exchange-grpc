syntax = "proto3";

package spot.v1;

option go_package = "github.com/exchange-grpc/proto/pb/spot/v1;spotv1";

import "buf/validate/validate.proto";
import "common/v1/market.proto";
import "common/v1/pagination.proto";

// SpotService — сервис спотовых инструментов и рынков.
service SpotService {
  rpc ViewMarkets(ViewMarketsRequest) returns (ViewMarketsResponse);
  rpc GetMarket(GetMarketRequest) returns (GetMarketResponse);
}

// ViewMarketsRequest — запрос списка рынков.
// Роли пользователя извлекаются на сервере из JWT/metadata.
message ViewMarketsRequest {
  common.v1.CursorPagination pagination = 1;
}

message ViewMarketsResponse {
  repeated common.v1.Market markets = 1;
  common.v1.CursorPageInfo page_info = 2;
}

message GetMarketRequest {
  string market_id = 1 [(buf.validate.field).string.min_len = 1];
}

message GetMarketResponse {
  common.v1.Market market = 1;
}
